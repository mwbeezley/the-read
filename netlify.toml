[build]
  functions = "netlify/functions"
  publish   = "."

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/claude"
  to   = "/.netlify/functions/claude"
  status = 200
  force  = true

[[redirects]]
  from = "/api/odds"
  to   = "/.netlify/functions/odds"
  status = 200
  force  = true

[[redirects]]
  from = "/api/kalshi"
  to   = "/.netlify/functions/kalshi"
  status = 200
  force  = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://site.api.espn.com https://api.the-odds-api.com;"
